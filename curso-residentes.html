<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Residentes | ExamenNetser</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 50%, #64748b 100%);
            min-height: 100vh;
        }
        .navbar {
            background: white;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { height: 45px; }
        .nav-links a {
            text-decoration: none;
            color: #666;
            padding: 6px 14px;
            font-weight: 500;
        }
        .nav-links a.active { background: #2563eb; color: white; border-radius: 8px; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .user-avatar {
            width: 28px; height: 28px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .logout-btn { background: none; border: none; color: #dc2626; cursor: pointer; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
        }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        .video-card, .signature-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .video-header, .signature-header {
            background: white;
            color: #2563eb;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        video { width: 100%; display: block; }
        .watch-status {
            background: #fff3cd;
            padding: 8px 12px;
            text-align: center;
            font-size: 13px;
        }
        .watch-status.completed { background: #d4edda; color: #155724; }
        .signature-body { padding: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
        .form-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .sign-btn {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }
        .sign-btn:disabled { background: #ccc; cursor: not-allowed; }
        .footer-note { font-size: 10px; text-align: center; color: #999; margin-top: 12px; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 10px 18px;
            border-radius: 8px;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid #16a34a; }
        .toast.error { border-left: 4px solid #dc2626; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="https://exam-netser.vercel.app/assets/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        </div>
        <div class="nav-links">
            <a href="index.html">🏠 Inicio</a>
            <a href="curso-residentes.html" class="active">🎥 Curso Residentes</a>
            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar">E</div>
                <span id="userName">Cargando...</span>
                <button class="logout-btn" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="main-layout">
            <div class="video-card">
                <div class="video-header"><i class="fas fa-play-circle"></i> Residentes Netser</div>
                <video id="videoPlayer" controls>
                    <source src="https://1pu2mkw0da1vc7lq.public.blob.vercel-storage.com/videos/Residentes%20v2%20-%20Hecho%20con%20Microsoft%20Clipchamp_1777335302990.mp4" type="video/mp4">
                </video>
                <div class="watch-status pending" id="estadoVisualizacion">
                    📺 Progreso: 0% - Debes ver el video completo para firmar
                </div>
            </div>

            <div class="signature-card">
                <div class="signature-header"><i class="fas fa-signature"></i> Firma Digital</div>
                <div class="signature-body">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombreCompleto" disabled>
                    </div>
                    <div class="form-group">
                        <label>Empresa / Institución</label>
                        <input type="text" id="empresaResidente" placeholder="Nombre de la empresa" disabled>
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="text" id="fechaVisualizacion" disabled>
                    </div>
                    <button class="sign-btn" id="btnFirmar" disabled>
                        <i class="fas fa-pen-fancy"></i> Firmar con BoldSign
                    </button>
                    <div class="footer-note"><i class="fas fa-lock"></i> Recibirás un correo para firmar digitalmente</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let usuarioActual = null;
        let videoCompletado = false;
        let videoElement = null;

        function mostrarMensaje(mensaje, tipo) {
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.innerHTML = `<span>${mensaje}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.remove(), 3000);
        }

        const user = localStorage.getItem('user');
        if (user) {
            usuarioActual = JSON.parse(user);
            document.getElementById('userName').textContent = `${usuarioActual.first_name} ${usuarioActual.last_name}`;
            document.getElementById('userAvatar').textContent = usuarioActual.first_name.charAt(0).toUpperCase();
            document.getElementById('nombreCompleto').value = `${usuarioActual.first_name} ${usuarioActual.last_name}`;
            document.getElementById('fechaVisualizacion').value = new Date().toLocaleDateString('es-ES');
        } else {
            window.location.href = 'index.html';
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        const video = document.getElementById('videoPlayer');
        const estadoDiv = document.getElementById('estadoVisualizacion');
        const btnFirmar = document.getElementById('btnFirmar');
        const inputEmpresa = document.getElementById('empresaResidente');

        video.addEventListener('timeupdate', () => {
            const porcentaje = (video.currentTime / video.duration) * 100;
            if (porcentaje >= 95 && !videoCompletado) {
                videoCompletado = true;
                estadoDiv.className = 'watch-status completed';
                estadoDiv.innerHTML = '✅ Video completado - Ya puedes firmar';
                inputEmpresa.disabled = false;
                btnFirmar.disabled = false;
            } else if (!videoCompletado) {
                estadoDiv.innerHTML = `📺 Progreso: ${Math.round(porcentaje)}% - Debes ver el video completo`;
            }
        });

        async function firmarConBoldSign() {
            const empresa = document.getElementById('empresaResidente').value.trim();
            if (!empresa) { mostrarMensaje('Ingresa el nombre de tu empresa', 'error'); return; }
            
            btnFirmar.disabled = true;
            btnFirmar.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Enviando...';
            
            try {
                const response = await fetch('/api/send-signature', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        empresa: empresa,
                        nombreCompleto: `${usuarioActual.first_name} ${usuarioActual.last_name}`,
                        email: usuarioActual.email,
                        fecha: document.getElementById('fechaVisualizacion').value
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                
                mostrarMensaje(`✅ Correo enviado a ${usuarioActual.email}`, 'success');
                inputEmpresa.value = '';
                btnFirmar.disabled = true;
                videoCompletado = false;
                video.currentTime = 0;
                video.load();
                estadoDiv.className = 'watch-status pending';
                
            } catch (error) {
                mostrarMensaje(error.message, 'error');
                btnFirmar.disabled = false;
                btnFirmar.innerHTML = '<i class="fas fa-pen-fancy"></i> Firmar con BoldSign';
            }
        }

        document.getElementById('btnFirmar').addEventListener('click', firmarConBoldSign);
    </script>
</body>
</html>
